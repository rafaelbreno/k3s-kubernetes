name: Sync k8s tags to k3s-io/kubernetes

on:
  workflow_dispatch:
    inputs:
      new_k8s_version:
        description: "New upstream k8s tag (e.g. v1.33.13)"
        required: true
        type: string
      old_k8s_version:
        description: "Previous k8s tag (blank = derive from fork k3s tags)"
        required: false
        type: string
      new_suffix:
        description: "k3s suffix"
        required: false
        default: "k3s1"
        type: string
      dry_run:
        description: "Dry run (generate + print, do not push)"
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      new_k8s_version:
        required: true
        type: string
      old_k8s_version:
        required: false
        type: string
      new_suffix:
        required: false
        default: "k3s1"
        type: string
      dry_run:
        required: false
        default: true
        type: boolean

jobs:
  sync-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Stage scripts outside working tree
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          mkdir -p "$RUNNER_TEMP/scripts"
          cp "$WORKSPACE/.github/scripts/"*.sh "$RUNNER_TEMP/scripts/"
          chmod +x "$RUNNER_TEMP/scripts/"*.sh

      - name: Generate k3s tags
        env:
          NEW_K8S_VERSION: ${{ inputs.new_k8s_version }}
          OLD_K8S_VERSION: ${{ inputs.old_k8s_version }}
          NEW_SUFFIX: ${{ inputs.new_suffix }}
          GIT_USER_NAME: "github-actions[bot]"
          GIT_USER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
          WORKSPACE: ${{ github.workspace }}
        run: "$RUNNER_TEMP/scripts/generate-k3s-tags.sh"

      - name: Push k3s tags
        env:
          NEW_K8S_VERSION: ${{ inputs.new_k8s_version }}
          DRY_RUN: ${{ inputs.dry_run }}
          WORKSPACE: ${{ github.workspace }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: "$RUNNER_TEMP/scripts/push-k3s-tags.sh"
